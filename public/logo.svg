<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- Bull head silhouette -->
  <g transform="translate(4,4)">
    <ellipse cx="26" cy="30" rx="18" ry="16" fill="#2E5370"/>
    <ellipse cx="26" cy="28" rx="14" ry="12" fill="#1A2942"/>
    <!-- Horns -->
    <path d="M14 20 Q6 10 10 6 Q14 2 16 10" stroke="#C91926" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M38 20 Q46 10 42 6 Q38 2 36 10" stroke="#C91926" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Eyes -->
    <circle cx="20" cy="26" r="2.5" fill="#BDB68C"/>
    <circle cx="32" cy="26" r="2.5" fill="#BDB68C"/>
    <circle cx="20.8" cy="25.2" r="1" fill="#1A2942"/>
    <circle cx="32.8" cy="25.2" r="1" fill="#1A2942"/>
    <!-- Nose -->
    <ellipse cx="26" cy="36" rx="8" ry="5" fill="#2E5370"/>
    <circle cx="22.5" cy="36" r="2" fill="#1A2942"/>
    <circle cx="29.5" cy="36" r="2" fill="#1A2942"/>
    <!-- Ear -->
    <ellipse cx="12" cy="26" rx="4" ry="5" fill="#2E5370"/>
    <ellipse cx="40" cy="26" rx="4" ry="5" fill="#2E5370"/>
  </g>
  <!-- MINERVA FOODS text -->
  <text x="60" y="28" font-family="Georgia, serif" font-size="18" font-weight="700" letter-spacing="2" fill="#1A2942">MINERVA</text>
  <text x="60" y="46" font-family="Georgia, serif" font-size="13" font-weight="400" letter-spacing="4" fill="#C91926">FOODS</text>
  <!-- Gold underline accent -->
  <rect x="60" y="50" width="148" height="2" fill="#BDB68C" rx="1"/>
</svg>
